name: Monthly Copernicus SSTA/SSHA Scraper

on:
  schedule:
    # Runs at 02:00 UTC on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas xarray copernicusmarine netCDF4 h5netcdf
        
    - name: Run Copernicus Anomaly Script
      env:
        COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
        COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
      run: |
        python fetch_ocean_anomalies.py
        
    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add tmd-weather-app/public/ocean_anomalies_history.csv
        git commit -m "chore: Update Copernicus Sea Surface Anomalies (Monthly)" || echo "No changes to commit"
        git push
